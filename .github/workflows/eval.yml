name: Agent Eval Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --tb=short

  eval-gate:
    name: Eval gate (mock metrics, no LLM)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run eval suite against wiki_50 dataset
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path

          from agent_eval_suite import AgentResult, EvalRunner, load_dataset
          from agent_eval_suite.harness.config import EvalConfig
          from agent_eval_suite.metrics.ragas_simple import compute_metrics_mock
          from agent_eval_suite.metrics.deepeval_layer import compute_metrics_mock as deepeval_mock
          from agent_eval_suite.metrics.trajectory import compute_trajectory_metrics

          DATASET = "datasets/wiki_50.json"
          THRESHOLDS = {"answer_correctness": 0.4, "answer_relevancy": 0.1}

          def stub_agent(query: str) -> AgentResult:
              # Minimal stub: real agent would go here
              return AgentResult(answer=f"stub answer to: {query[:40]}")

          config = EvalConfig(thresholds=THRESHOLDS)
          dataset = load_dataset(DATASET)
          scorecard = EvalRunner(stub_agent, config).run(dataset)
          scorecard = compute_metrics_mock(scorecard, dataset, config)
          scorecard = deepeval_mock(scorecard, dataset, config)
          scorecard = compute_trajectory_metrics(scorecard, dataset, config)

          scorecard.to_json("artifacts/scorecard.json")
          Path("artifacts").mkdir(exist_ok=True)
          scorecard.to_csv("artifacts/scorecard.csv")

          print("=== Aggregate scores ===")
          for k, v in scorecard.aggregate.items():
              print(f"  {k}: {v:.3f}")

          # Gate: fail if any threshold is breached
          failures = []
          for metric, threshold in THRESHOLDS.items():
              score = scorecard.aggregate.get(metric)
              if score is not None and score < threshold:
                  failures.append(f"{metric}={score:.3f} < {threshold}")

          if failures:
              print("THRESHOLD FAILURES:", failures, file=sys.stderr)
              sys.exit(1)

          print("All thresholds passed.")
          EOF

      - name: Upload scorecard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-${{ github.sha }}
          path: artifacts/
          retention-days: 30
